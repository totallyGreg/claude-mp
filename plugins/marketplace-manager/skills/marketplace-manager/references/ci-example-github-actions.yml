# .github/workflows/plugin-validation.yml
# Validates Claude Code plugin structure and version enforcement on PRs.
# Uses repo-local scripts installed by marketplace-manager setup.py.
# These scripts are stdlib-only Python -- no pip/uv needed.

name: Plugin Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate marketplace schema
        run: python3 scripts/validate.py --format json

      - name: Check version bumps
        run: python3 scripts/sync.py --dry-run

      - name: Check structure (advisory)
        run: python3 scripts/validate.py --check-structure || true
