# Validates Claude Code plugin structure and version enforcement on MRs.
# Uses repo-local scripts installed by marketplace-manager setup.py.
# These scripts are stdlib-only Python -- no pip/uv needed.
#
# Notes:
# - validate.py and sync.py are self-contained, stdlib-only scripts copied
#   into the repo by `setup.py install-scripts`. No runtime dependency on
#   marketplace-manager.
# - GitLab CI shallow clones do NOT include the target branch ref. The git fetch
#   in version:check is mandatory -- without it, `git diff origin/main...HEAD` fails.
# - validate and structure-check run on all pipelines (MR + default branch).
#   version:check only runs on MR pipelines where a target branch exists.

stages:
  - validate
  - version

validate:plugin:
  stage: validate
  image: python:3.12-slim
  script:
    - python3 scripts/validate.py --format json
    - python3 scripts/validate.py --check-structure

version:check:
  stage: version
  image: python:3.12-slim
  before_script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME" --quiet
  script:
    - python3 scripts/sync.py --dry-run
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
